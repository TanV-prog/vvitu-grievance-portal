<!DOCTYPE html>
<html>
  <head>
    <title>Admin Login — VVITU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>

      body {
        font-family: 'Poppins', sans-serif;
        background-color: #fff5f3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login-box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
      }

      h2 {
        color: #F38471;
        margin-bottom: 5px;
      }

      p {
        color: gray;
        font-size: 13px;
        margin-bottom: 25px;
      }

      label {
        display: block;
        text-align: left;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        margin-top: 15px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        margin-top: 5px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        font-family: 'Poppins', sans-serif;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #F38471;
        outline: none;
        box-shadow: 0 0 0 3px rgba(243,132,113,0.15);
      }

      button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background-color: #F38471;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
      }

      button:hover {
        background-color: #e06b57;
      }

      .error {
        color: red;
        font-size: 13px;
        margin-top: 10px;
        display: none;
      }

    </style>
  </head>
  <body>

    <div class="login-box">
      <h2>Admin Login</h2>
      <p>VVITU Grievance Portal — Staff Only</p>

      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <p class="error" id="error-msg">❌ Incorrect username or password.</p>

      <button onclick="adminLogin()">Login</button>
    </div>

    <script>
      function adminLogin() {
        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value.trim();

        // Admin credentials 
        var correctUsername = "Admin";
        var correctPassword = "ad123";

        if (username === correctUsername && password === correctPassword) {
          // Save login status and go to dashboard
          localStorage.setItem("adminLoggedIn", "true");
          window.location.href = "dashboard.html";
          
        } else {
          document.getElementById("error-msg").style.display = "block";
        }
      }
    </script>

  </body>
</html>
