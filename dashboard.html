<!DOCTYPE html>
<html>
  <head>
    <title>Admin Dashboard — VVITU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>

      body {
        font-family: 'Poppins', sans-serif;
        background-color: #fff5f3;
        padding: 30px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      h1 {
        color: #F38471;
        font-size: 22px;
      } 
      .controls {
       display: flex;
       gap: 10px;
       margin-bottom: 20px;
       flex-wrap: wrap;
      }

      .search-input {
       flex: 1;
       padding: 9px 12px;
       border: 1.5px solid #ddd;
       border-radius: 8px;
       font-size: 14px;
       font-family: 'Poppins', sans-serif;
       min-width: 150px;
      }

      .search-input:focus {
       border-color: #F38471;
       outline: none;
       box-shadow: 0 0 0 3px rgba(243,132,113,0.15);
      }

      .filter-select {
       padding: 9px 12px;
       border: 1.5px solid #ddd;
       border-radius: 8px;
       font-size: 14px;
       font-family: 'Poppins', sans-serif;
       background: white;
       cursor: pointer;
     }   

     .filter-select:focus {
       border-color: #F38471;
       outline: none;
      }

     .delete-btn {
       padding: 5px 12px;
       background-color: white;
       color: #e06b57;
       border: 1.5px solid #e06b57;
       border-radius: 20px;
       font-size: 12px;
       font-family: 'Poppins', sans-serif;
       font-weight: 600;
       cursor: pointer;
       margin-top: 10px;
      }

      .delete-btn:hover {
       background-color: #FCEBEB;
      }

      .no-results {
       text-align: center;
       color: gray;
       margin-top: 40px;
       font-size: 14px;
       } 

      .logout-btn {
        padding: 8px 20px;
        background-color: #F38471;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-size: 13px;
        font-weight: 600;
      }

      .logout-btn:hover {
        background-color: #e06b57;
      }

      .no-complaints {
        text-align: center;
        color: gray;
        margin-top: 60px;
        font-size: 15px;
      }

      .complaint-card {
        background: white;
        border-radius: 10px;
        padding: 20px 25px;
        margin-bottom: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-left: 5px solid #F38471;
      }

      .complaint-id {
        font-size: 12px;
        color: #F38471;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .complaint-name {
        font-size: 16px;
        font-weight: 600;
        color: #333;
      }

      .complaint-info {
        font-size: 13px;
        color: #777;
        margin-top: 4px;
      }

      .complaint-category {
        display: inline-block;
        margin-top: 10px;
        padding: 3px 12px;
        background-color: #fff5f3;
        border: 1px solid #F38471;
        border-radius: 20px;
        font-size: 12px;
        color: #F38471;
        font-weight: 600;
        text-transform: capitalize;
      }

      .complaint-date {
        font-size: 11px;
        color: #aaa;
        margin-top: 8px;
      }

      .count {
        font-size: 13px;
        color: gray;
        margin-bottom: 20px;
      }

      .complaint-description {
     font-size: 13px;
     color: #555;
     margin-top: 10px;
     padding: 10px;
     background-color: #fff5f3;
     border-radius: 6px;
     line-height: 1.5;
     }

      .complaint-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
     }

      .status-tag {
     padding: 4px 14px;
     border-radius: 20px;
     font-size: 12px;
     font-weight: 600;
     cursor: pointer;
     }

     .pending {
     background-color: #fff3cd;
     color: #856404;
     border: 1px solid #ffc107;
    }

     .resolved {
     background-color: #d1f5d3;
     color: #1a6e22;
     border: 1px solid #28a745;
     }

     .clear-btn {
     padding: 8px 20px;
      background-color: white;
      color: #F38471;
      border: 2px solid #F38471;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin-left: 10px;
      }

       .clear-btn:hover {
        background-color: #fff5f3;
      }

        /* MOBILE FRIENDLY */
        @media (max-width: 600px) {
        body {
        padding: 15px;
       }

       .complaint-card {
       padding: 15px;
       }

        .complaint-footer {
       flex-direction: column;
       align-items: flex-start;
        gap: 8px;
       }

       h1 {
       font-size: 18px;
        }
      }

      .badges {
       display: flex;
       gap: 15px;
       margin-bottom: 20px;
       flex-wrap: wrap;
     }

     .badge {
       padding: 12px 20px;
       border-radius: 10px;
       font-size: 13px;
       font-weight: 600;
       font-family: 'Poppins', sans-serif;
       min-width: 100px;
       text-align: center;
     }

      .badge-number {
       font-size: 24px;
       font-weight: 600;
       display: block;
       margin-bottom: 3px;
     }

     .badge-total {
       background-color: #fff5f3;
       color: #F38471;
       border: 1.5px solid #F38471;
      }

      .badge-pending {
       background-color: #fff3cd;
       color: #856404;
       border: 1.5px solid #ffc107;
      } 

      .badge-resolved {
       background-color: #d1f5d3;
       color: #1a6e22;
       border: 1.5px solid #28a745;
     }

    </style>
  </head>
  <body>

    
      
     <div class="header">
       <h1>Admin Dashboard</h1>
       <div>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
       </div>
     </div>
    </div>
    <!-- BADGES -->
    <div class="badges">
     <div class="badge badge-total">
       <span class="badge-number" id="badge-total">0</span>
         Total
     </div>
     <div class="badge badge-pending">
        <span class="badge-number" id="badge-pending">0</span>
         Pending
      </div>
      <div class="badge badge-resolved">
         <span class="badge-number" id="badge-resolved">0</span>
           Resolved
     </div>
    </div>



    <!-- SEARCH AND FILTER -->
    <div class="controls">
     <input
     type="text"
     class="search-input"
     id="search-input"
     placeholder="Search by name or roll number..."
     oninput="loadComplaints()"
     />
     <select class="filter-select" id="filter-select" onchange="loadComplaints()">
     <option value="">All Categories</option>
     <option value="hostel">Hostel</option>
     <option value="faculty">Faculty Behaviour</option>
     <option value="discipline">Discipline</option>
     <option value="ragging">Ragging</option>
     <option value="academic">Academic Issue</option>
     <option value="canteen">Canteen</option>
     <option value="transport">Transport</option>
     <option value="other">Other</option>
     </select>
     
    </div>
    <div id="content"></div>
    <script>

      /// Check if admin is logged in
     if (localStorage.getItem("adminLoggedIn") !== "true") {
     window.location.href = "admin_portal.html";
     }

     // Count badges from ALL complaints (not filtered)
      var allForCount = JSON.parse(localStorage.getItem("complaints") || "[]");
      var totalCount    = allForCount.length;
      var pendingCount  = allForCount.filter(function(c) { return c.status !== "Resolved"; }).length;
      var resolvedCount = allForCount.filter(function(c) { return c.status === "Resolved"; }).length;

      document.getElementById("badge-total").textContent    = totalCount;
      document.getElementById("badge-pending").textContent  = pendingCount;
      document.getElementById("badge-resolved").textContent = resolvedCount;

      function loadComplaints() {
      var complaints = JSON.parse(localStorage.getItem("complaints") || "[]");
      var content    = document.getElementById("content");
      var search     = document.getElementById("search-input").value.trim().toLowerCase();
      var filter     = document.getElementById("filter-select").value;

      // Apply filter
      if (filter) {
      complaints = complaints.filter(function(c) {
      return c.category === filter;
      });
     }

     // Apply search
     if (search) {
     complaints = complaints.filter(function(c) {
      return c.name.toLowerCase().includes(search) ||
             c.roll.toLowerCase().includes(search);
      });
     }

     if (complaints.length === 0) {
     content.innerHTML = '<p class="no-results">No complaints found.</p>';
     return;
     }

     // Get ALL complaints for correct index reference
     var allComplaints = JSON.parse(localStorage.getItem("complaints") || "[]");

     var html = '<p class="count">Showing ' + complaints.length + ' complaint(s)</p>';
 
     for (var i = complaints.length - 1; i >= 0; i--) {
      var c = complaints[i];

     // Find real index in allComplaints for delete/toggle
     var realIndex = allComplaints.findIndex(function(x) {
      return x.id === c.id;
     });

     // Build extra info
     var extraInfo = "";
     if (c.extra) {
       if (c.category === "hostel") {
        extraInfo = "Block: " + (c.extra.block || "-") + " &nbsp;|&nbsp; Room: " + (c.extra.room || "-");
       } else if (c.category === "faculty") {
        extraInfo = "Faculty: " + (c.extra.facultyName || "-") + " &nbsp;|&nbsp; Subject: " + (c.extra.subject || "-");
       } else if (c.category === "discipline") {
        extraInfo = "Department: " + (c.extra.department || "-") + " &nbsp;|&nbsp; Section: " + (c.extra.section || "-");
       } else if (c.category === "ragging") {
        extraInfo = "Location: " + (c.extra.location || "-") + " &nbsp;|&nbsp; Time: " + (c.extra.datetime || "-");
       } else if (c.category === "academic") {
        extraInfo = "Department: " + (c.extra.department || "-") + " &nbsp;|&nbsp; Subject: " + (c.extra.subject || "-");
       } else if (c.category === "canteen") {
        extraInfo = "Location: " + (c.extra.location || "-");
       } else if (c.category === "transport") {
        extraInfo = "Bus Number: " + (c.extra.busNumber || "-");
       }
     }

     html += `
      <div class="complaint-card">
        <div class="complaint-id">${c.id}</div>
        <div class="complaint-name">${c.name}</div>
        <div class="complaint-info">Roll: ${c.roll} &nbsp;|&nbsp; Phone: ${c.phone}</div>
        <div class="complaint-info">Email: ${c.email}</div>
        <div class="complaint-category">${c.category}</div>
        ${extraInfo ? `<div class="complaint-info" style="margin-top:6px;">📋 ${extraInfo}</div>` : ""}
        <div class="complaint-description">${c.description || "No description provided"}</div>
        <div class="complaint-footer">
          <div class="complaint-date">Submitted on: ${c.date}</div>
          <span class="status-tag ${c.status === 'Resolved' ? 'resolved' : 'pending'}"
                onclick="toggleStatus(${realIndex})">
            ${c.status || "Pending"}
          </span>
        </div>
        <button class="delete-btn" onclick="deleteComplaint(${realIndex})">🗑️ Delete</button>
      </div>
      `;
      }

      content.innerHTML = html;
     }

     function toggleStatus(index) {
     var complaints = JSON.parse(localStorage.getItem("complaints") || "[]");
     complaints[index].status = complaints[index].status === "Resolved" ? "Pending" : "Resolved";
     localStorage.setItem("complaints", JSON.stringify(complaints));
     loadComplaints();
     }

     function deleteComplaint(index) {
     var confirm = window.confirm("Are you sure you want to delete this complaint?");
     if (confirm) {
      var complaints = JSON.parse(localStorage.getItem("complaints") || "[]");
      complaints.splice(index, 1);
      localStorage.setItem("complaints", JSON.stringify(complaints));
      loadComplaints();
      }
     }

     function clearAll() {
     var confirm = window.confirm("Are you sure you want to delete all complaints?");
     if (confirm) {
     localStorage.removeItem("complaints");
     loadComplaints();
     }
     }

     function logout() {
     localStorage.removeItem("adminLoggedIn");
     window.location.href = "admin_portal.html";
     }

     loadComplaints();
    

    </script>

  </body>
</html>
